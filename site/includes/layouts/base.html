<!DOCTYPE html>
<html lang="en-US" class="wa-cloak wa-theme-default wa-palette-default wa-brand-blue">
  <head>
    <title>the thoughtshepherds{% if title %} | {{ title }}{% endif %}</title>
    <link rel="stylesheet" type="text/css" href="assets/styles/main.css">
  </head>
  <body>
    <wa-page>
      <header slot="header">
        {% if title %}
        <div class="h1">thoughtshepherds</div>
        {% else %}
        <h1>thoughtshepherds</h1>
        {% endif %}
        people leading thoughts
      </header>
      <header slot="subheader">
        <wa-breadcrumb>
          <wa-breadcrumb-item>
            <wa-icon slot="start" name="house"></wa-icon>
            Home
          </wa-breadcrumb-item>
        </wa-breadcrumb>
      </header>
      <main>
        {% if title %}
        <h1>{{ title }}</h1>
        {% endif %}
        {{ content }}
      </main>
    </wa-page>
    <script type="module" src="https://ka-f.webawesome.com/webawesome@3.5.0/webawesome.loader.js"></script>
  </body>
</html>
